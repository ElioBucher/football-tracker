<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<nav>
    <div class="logo">Football Tracker</div>
    <div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap">
        <div class="nav-links">
            <button class="nav-btn active" onclick="showPage('live')">
                <span class="live-dot"></span>Live
            </button>
            <button class="nav-btn" onclick="showPage('today')">Heute</button>
            <button class="nav-btn" onclick="showPage('standings')">Tabelle</button>
            <button class="nav-btn" onclick="showPage('scorers')">Torjäger</button>
            <button class="nav-btn" onclick="showPage('search')">Suche</button>
        </div>
        <button class="theme-toggle" onclick="toggleTheme()" title="Dark/Light Mode">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        </button>
    </div>
</nav>

<div class="container">

    <!-- LIVE PAGE -->
    <div id="page-live" class="page active">
        <div class="page-header">
            <div class="page-header-left">
                <h1 class="section-title">Live Spiele</h1>
                <span class="auto-refresh-badge" id="refresh-countdown"></span>
            </div>
            <button class="refresh-btn" onclick="loadLive()">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
                Aktualisieren
            </button>
        </div>
        <div id="live-content"></div>
    </div>

    <!-- TODAY PAGE -->
    <div id="page-today" class="page">
        <h1 class="section-title">Heutige Spiele</h1>
        <div id="today-content"></div>
    </div>

    <!-- STANDINGS PAGE -->
    <div id="page-standings" class="page">
        <h1 class="section-title">Liga-Tabellen</h1>
        <div class="liga-pills" id="standings-pills">
            <div class="pill active" onclick="loadStandings('PL', this)">Premier League</div>
            <div class="pill" onclick="loadStandings('BL1', this)">Bundesliga</div>
            <div class="pill" onclick="loadStandings('SA', this)">Serie A</div>
            <div class="pill" onclick="loadStandings('PD', this)">La Liga</div>
            <div class="pill" onclick="loadStandings('FL1', this)">Ligue 1</div>
            <div class="pill" onclick="loadStandings('CL', this)">Champions League</div>
        </div>
        <div id="standings-content"></div>
    </div>

    <!-- SCORERS PAGE -->
    <div id="page-scorers" class="page">
        <h1 class="section-title">Torjägerliste</h1>
        <div class="liga-pills" id="scorers-pills">
            <div class="pill active" onclick="loadScorers('PL', this)">Premier League</div>
            <div class="pill" onclick="loadScorers('BL1', this)">Bundesliga</div>
            <div class="pill" onclick="loadScorers('SA', this)">Serie A</div>
            <div class="pill" onclick="loadScorers('PD', this)">La Liga</div>
            <div class="pill" onclick="loadScorers('FL1', this)">Ligue 1</div>
            <div class="pill" onclick="loadScorers('CL', this)">Champions League</div>
        </div>
        <div id="scorers-content"></div>
    </div>

    <!-- SEARCH PAGE -->
    <div id="page-search" class="page">
        <h1 class="section-title">Team suchen</h1>
        <div id="favorites-section" style="margin-bottom:20px"></div>
        <div class="search-bar">
            <input type="text" id="search-input" placeholder="z.B. Bayern, Arsenal, Barcelona…"
                   onkeydown="if(event.key==='Enter') searchTeam()"/>
            <button onclick="searchTeam()">Suchen</button>
        </div>
        <div id="search-content"></div>
    </div>

    <!-- TEAM PAGE -->
    <div id="page-team" class="page">
        <button class="back-btn" onclick="showPage('search')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
            Zurück
        </button>
        <div id="team-header"></div>
        <div class="tabs">
            <div class="tab active" onclick="switchTeamTab('matches', this)">Spiele</div>
            <div class="tab" onclick="switchTeamTab('squad', this)">Kader</div>
        </div>
        <div id="team-tab-matches">
            <div class="liga-pills">
                <div class="pill active" onclick="loadTeamMatches('SCHEDULED', this)">Nächste Spiele</div>
                <div class="pill" onclick="loadTeamMatches('FINISHED', this)">Letzte Spiele</div>
                <div class="pill" onclick="loadTeamMatches('LIVE', this)">Live</div>
            </div>
            <div id="team-content"></div>
        </div>
        <div id="team-tab-squad" style="display:none">
            <div id="squad-content"></div>
        </div>
    </div>

</div>

<!-- MATCH DETAIL MODAL -->
<div class="modal-overlay" id="match-modal" onclick="closeModal(event)">
    <div class="modal">
        <button class="modal-close" onclick="document.getElementById('match-modal').classList.remove('open')">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
        <div id="modal-content"></div>
    </div>
</div>

</body>

<script src="app.js"></script>
</html>
